<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA Local</title>
    
    <!-- Carregando arquivos locais da pasta static -->
    <link rel="stylesheet" href="/static/atom-one-dark.min.css">
    <script src="/static/marked.min.js"></script>
    <script src="/static/highlight.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #343541;
            color: #ececf1;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: #202123; padding: 15px 20px;
            display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid #4d4d4f;
        }

        h1 { margin: 0; font-size: 1.2rem; color: #ececf1; }

        #clear-btn {
            background-color: transparent; color: #ff6b6b;
            border: 1px solid #ff6b6b; padding: 8px 15px;
            border-radius: 5px; cursor: pointer; font-size: 0.9rem;
        }
        #clear-btn:hover { background-color: #ff6b6b; color: white; }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px;
            max-width: 800px; margin: 0 auto; width: 100%; box-sizing: border-box;
        }

        .message {
            margin-bottom: 20px; padding: 15px; border-radius: 5px;
            line-height: 1.6; max-width: 80%; overflow-x: auto;
        }

        .user {
            background-color: #10a37f; color: white;
            margin-left: auto; text-align: right;
        }

        .assistant {
            background-color: #444654; color: #d1d5db;
            margin-right: auto;
        }

        /* Estilo do Editor de Código */
        pre {
            background-color: #282c34; 
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
            position: relative;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        code {
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.9em;
        }

        /* Botão Copiar */
        .copy-btn {
            position: absolute; top: 5px; right: 5px;
            background: #3b4048; color: #abb2bf;
            border: none; padding: 5px 10px;
            border-radius: 4px; cursor: pointer;
            font-size: 12px; opacity: 0; transition: opacity 0.2s;
        }
        pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { background: #4b5160; color: white; }

        .message p { margin: 0 0 10px 0; }
        .message ul, .message ol { padding-left: 20px; }

        /* Input Area */
        #input-area {
            background-color: #202123; padding: 20px;
            display: flex; justify-content: center; gap: 10px;
        }
        #user-input {
            flex: 1; max-width: 700px; padding: 15px; border-radius: 5px;
            border: 1px solid #565869; background-color: #40414f;
            color: white; font-size: 16px; outline: none;
        }
        #user-input:focus { border-color: #10a37f; }
        #send-btn {
            padding: 15px 25px; background-color: #10a37f; color: white;
            border: none; border-radius: 5px; font-size: 16px; cursor: pointer;
        }
        #send-btn:hover { background-color: #0d8a6a; }
        #send-btn:disabled { background-color: #565869; cursor: not-allowed; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .typing-cursor::after { content: '▋'; animation: blink 1s infinite; margin-left: 2px; }
    </style>
</head>
<body>

    <header>
        <h1>DECOM IA</h1>
        <button id="clear-btn" onclick="clearChat()">Nova Conversa</button>
    </header>

    <div id="chat-container"></div>

    <div id="input-area">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off">
        <button id="send-btn">Enviar</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        let conversationHistory = [];

        window.onload = function() {
            const savedHistory = localStorage.getItem('ollama_chat_history');
            if (savedHistory) {
                conversationHistory = JSON.parse(savedHistory);
                conversationHistory.forEach(msg => {
                    appendFormattedMessage(msg.content, msg.role);
                });
            }
        };

        function saveHistory() {
            localStorage.setItem('ollama_chat_history', JSON.stringify(conversationHistory));
        }

        function clearChat() {
            if(confirm("Tem certeza que deseja iniciar uma nova conversa?")) {
                conversationHistory = [];
                chatContainer.innerHTML = '';
                localStorage.removeItem('ollama_chat_history');
            }
        }

        // --- FUNÇÕES DE FORMATAÇÃO E BOTÃO COPIAR ---

        // Adiciona botão de copiar e aplica highlight
        function formatCodeBlocks(container) {
            const codeBlocks = container.querySelectorAll('pre code');
            
            codeBlocks.forEach((block) => {
                // Aplica coloração (Highlight.js)
                hljs.highlightElement(block);
                
                // Cria botão de copiar
                const pre = block.parentElement;
                if (!pre.querySelector('.copy-btn')) {
                    const button = document.createElement('button');
                    button.className = 'copy-btn';
                    button.innerText = 'Copiar';
                    
                    button.addEventListener('click', () => {
                        navigator.clipboard.writeText(block.innerText).then(() => {
                            button.innerText = 'Copiado!';
                            setTimeout(() => button.innerText = 'Copiar', 2000);
                        });
                    });
                    pre.appendChild(button);
                }
            });
        }

        // Renderiza a mensagem final com Markdown
        function appendFormattedMessage(text, sender) {
            const div = document.createElement('div');
            div.classList.add('message', sender);
            
            // 1. Converte Markdown para HTML
            div.innerHTML = marked.parse(text);
            
            chatContainer.appendChild(div);
            
            // 2. Processa os blocos de código (Highlight + Botão)
            formatCodeBlocks(div);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        // ------------------------------------------------

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            userInput.disabled = true;
            sendBtn.disabled = true;
            sendBtn.textContent = "Pensando...";

            appendFormattedMessage(message, 'user');
            conversationHistory.push({ role: 'user', content: message });
            userInput.value = '';
            saveHistory();

            // Elemento temporário para resposta streaming
            const div = document.createElement('div');
            div.classList.add('message', 'assistant');
            const contentSpan = document.createElement('div');
            contentSpan.classList.add('content', 'typing-cursor');
            div.appendChild(contentSpan);
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullResponse = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.replace('data: ', '');
                            const data = JSON.parse(jsonStr);
                            if (data.text) {
                                fullResponse += data.text;
                                // Mostra texto cru enquanto digita
                                contentSpan.innerText = fullResponse;
                            }
                        }
                    }
                }
                
                // Ao terminar, formata tudo (Markdown + Código)
                contentSpan.classList.remove('typing-cursor');
                // Usa innerHTML via marked.parse
                contentSpan.innerHTML = marked.parse(fullResponse);
                
                // Aplica Highlight e Botão nos novos códigos
                formatCodeBlocks(contentSpan);

                conversationHistory.push({ role: 'assistant', content: fullResponse });
                saveHistory();

            } catch (error) {
                contentSpan.innerText = "Erro ao conectar com o servidor Ollama.";
                console.error(error);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                sendBtn.textContent = "Enviar";
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !sendBtn.disabled) sendMessage();
        });
    </script>
</body>
</html>
